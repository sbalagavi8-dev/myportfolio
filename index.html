<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Dashboard - Dhan API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      /* Mobile-first perfection matching your screenshot */
      :root {
        --loss-heavy: linear-gradient(135deg, #ff6b6b, #ff5252);
        --loss-medium: linear-gradient(135deg, #ffa726, #ff9800);
        --profit: linear-gradient(135deg, #4caf50, #66bb6a);
        --card-theme-1: linear-gradient(135deg, #f8f9fa, #e9ecef);
        --card-theme-2: linear-gradient(135deg, #e3f2fd, #bbdefb);
        --card-theme-3: linear-gradient(135deg, #f3e5f5, #e1bee7);
        --card-theme-4: linear-gradient(135deg, #e8f5e8, #c8e6c9);
      }

      body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
      
      .card-theme-1 { background: var(--card-theme-1) !important; }
      .card-theme-2 { background: var(--card-theme-2) !important; }
      .card-theme-3 { background: var(--card-theme-3) !important; }
      .card-theme-4 { background: var(--card-theme-4) !important; }
      
      .profit { background: var(--profit) !important; color: white !important; }
      .loss-heavy { background: var(--loss-heavy) !important; color: white !important; }
      .loss-medium { background: var(--loss-medium) !important; color: white !important; }

      .hover-card {
        transition: all 0.2s ease;
        border: none !important;
        border-radius: 16px !important;
      }
      .hover-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.15) !important;
      }

      /* Badge perfection */
      .tag-badge {
        font-size: 0.65rem !important;
        padding: 0.3rem 0.6rem !important;
        border-radius: 12px !important;
        font-weight: 600 !important;
      }
      .tag-badge.qty { background: #e3f2fd !important; color: #1976d2 !important; }
      .tag-badge.inv { background: #f3e5f5 !important; color: #7b1fa2 !important; }
      .tag-badge.market { background: #e8f5e8 !important; color: #388e3c !important; }
      .tag-badge.type { background: #fff3e0 !important; color: #f57c00 !important; }

      /* Mobile optimizations */
      @media (max-width: 576px) {
        .card { margin-bottom: 1rem !important; padding: 1rem !important; }
        .card-body { padding: 0.75rem !important; }
        .btn-sm { padding: 0.25rem 0.75rem; font-size: 0.75rem; }
        .progress { height: 6px !important; }
        h1 { font-size: 1.75rem !important; }
      }

      /* Progress bar */
      .progress {
        height: 8px !important;
        background: #f8f9fa !important;
        border-radius: 4px;
      }
      .progress-bar {
        background: linear-gradient(90deg, var(--profit), #81c784) !important;
        border-radius: 4px;
      }

      /* Filter scroll */
      .filter-scroll { 
        overflow-x: auto; 
        scrollbar-width: none; 
        -ms-overflow-style: none; 
      }
      .filter-scroll::-webkit-scrollbar { display: none; }

      /* Stats cards */
      .stat-card {
        background: rgba(255,255,255,0.8);
        border-radius: 12px;
        padding: 1rem;
        backdrop-filter: blur(10px);
      }
    </style>
  </head>
  <body>
    <div class="container py-4 py-md-5">
      <!-- Header -->
      <div class="text-center mb-4 mb-md-5">
        <span class="badge bg-primary mb-3 px-3 py-2 fs-6">Portfolio Visualizer</span>
        <h1 class="display-5 display-md-4 fw-bold mb-3">My Portfolio Holdings</h1>
        <p class="text-muted mx-auto fw-medium" style="max-width: 600px;">
          Dhan API powered dashboard showing your holdings as modern cards
        </p>
      </div>

      <!-- Stats Row -->
      <div class="row g-3 g-md-4 mb-4">
        <div class="col-6 col-md-3">
          <div class="stat-card text-center">
            <h6 class="mb-1 small fw-bold text-muted">Total Holdings</h6>
            <p id="total-holdings" class="fs-3 fw-bold mb-0">—</p>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card text-center">
            <h6 class="mb-1 small fw-bold text-muted">Total Investment</h6>
            <p id="total-investment" class="fs-3 fw-bold mb-0">—</p>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card text-center">
            <h6 class="mb-1 small fw-bold text-muted">Current Value</h6>
            <p id="current-value" class="fs-3 fw-bold mb-0">—</p>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card text-center">
            <h6 class="mb-1 small fw-bold text-muted">P/L</h6>
            <p id="total-pl" class="fs-3 fw-bold mb-0">—</p>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="mb-4">
        <div class="d-flex flex-wrap gap-2 mb-3">
          <span class="text-muted small me-2 align-self-center">Filter:</span>
          <div class="filter-scroll d-flex gap-1 flex-nowrap">
            <button id="filter-all" class="btn btn-outline-primary btn-sm active-filter">All</button>
            <button id="filter-etf" class="btn btn-outline-primary btn-sm">ETF</button>
            <button id="filter-stk" class="btn btn-outline-primary btn-sm">STK</button>
          </div>
        </div>
        
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <span class="text-muted small me-2">Sort by:</span>
          <div class="filter-scroll d-flex gap-1 flex-nowrap">
            <button id="sort-name" class="btn btn-outline-primary btn-sm active-sort">Name</button>
            <button id="sort-invested" class="btn btn-outline-primary btn-sm">Invested</button>
            <button id="sort-pl" class="btn btn-outline-primary btn-sm">P/L%</button>
            <button id="sort-toggle" class="btn btn-outline-secondary btn-sm">Asc</button>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div id="status" class="alert alert-info d-none mb-4" role="alert"></div>
      
      <!-- Holdings -->
      <div id="holdings-row" class="row g-3 g-md-4"></div>
    </div>

    <script>
      const statusElement = document.getElementById("status");
      const holdingsRow = document.getElementById("holdings-row");
      const totalHoldingsEl = document.getElementById("total-holdings");
      const totalInvestmentEl = document.getElementById("total-investment");
      const currentValueEl = document.getElementById("current-value");
      const totalPlEl = document.getElementById("total-pl");

      let currentHoldings = [];
      let sortField = 'name';
      let sortAsc = true;
      let currentFilter = 'all';

      function showStatus(message, type = "info") {
        statusElement.textContent = message;
        statusElement.className = `alert alert-${type} mb-4`;
        statusElement.classList.remove("d-none");
      }

      function hideStatus() {
        statusElement.classList.add("d-none");
      }

      function renderCard(item, index) {
        const symbol = item.tradingSymbol || item.symbol || "Unknown";
        const name = (item.stockName || item.companyName || "").trim() || null;
        const qty = item.totalQty ?? item.qty ?? 0;
        const avgPrice = item.avgCostPrice ?? item.averagePrice ?? 0;
        const lastPrice = item.lastPrice ?? item.closePrice ?? item.price ?? 0;
        const lastPriceValue = Number(lastPrice);
        const lastPriceText = Number.isFinite(lastPriceValue) ? `₹${lastPriceValue.toFixed(2)}` : "—";
        
        const marketTag = (item.exchange || "NSE").includes("BSE") ? "BSE" : "NSE";
        const typeTag = item.instrumentType === "ETF" ? "ETF" : "STK";
        const totalInvested = qty * avgPrice;
        
        const profitValue = Number.isFinite(lastPriceValue) ? (lastPriceValue - avgPrice) * qty : 0;
        const profitPercent = Number.isFinite(lastPriceValue) && avgPrice > 0 
          ? ((lastPriceValue - avgPrice) / avgPrice) * 100 
          : 0;
        
        const profitText = `₹${Math.abs(profitValue).toFixed(0)}`;
        const percentText = `${profitPercent.toFixed(1)}%`;
        const profitClass = profitValue >= 0 ? "text-success" : "text-danger";
        
        const themeClass = [`card-theme-${(index % 4) + 1}`];
        let cardClass = themeClass.join(" ");
        
        if (profitPercent > 0) {
          cardClass += " profit";
        } else {
          const lossPercent = Math.abs(profitPercent);
          if (lossPercent < 10) cardClass += " loss-light";
          else if (lossPercent < 25) cardClass += " loss-medium";
          else cardClass += " loss-heavy";
        }

        const progressWidth = Math.min(Math.max(profitPercent + 50, 10), 100);

        return `
          <div class="col-6 col-lg-4 col-xl-3">
            <div class="card h-100 shadow-sm hover-card ${cardClass}">
              <div class="card-body p-2 p-md-3 d-flex flex-column h-100">
                <div class="d-flex justify-content-between align-items-start mb-2 gap-2 flex-grow-1">
                  <div>
                    <h6 class="card-title fw-bold mb-1 fs-5 fs-md-4">${symbol}</h6>
                    ${name ? `<p class="text-muted small mb-0">${name}</p>` : ""}
                  </div>
                  <div class="d-flex flex-wrap gap-1">
                    <span class="badge tag-badge qty">Qty ${qty}</span>
                    <span class="badge tag-badge inv">₹${totalInvested.toLocaleString()}</span>
                    <span class="badge tag-badge market">${marketTag}</span>
                    <span class="badge tag-badge type">${typeTag}</span>
                  </div>
                </div>

                <div class="d-flex justify-content-between align-items-end mb-2 small text-muted flex-grow-1">
                  <div class="text-start">
                    <small class="mb-1 d-block">Avg</small>
                    <div class="fw-semibold">₹${avgPrice.toFixed(2)}</div>
                  </div>
                  <div class="text-center">
                    <small class="mb-1 d-block">Last</small>
                    <div class="fw-semibold">${lastPriceText}</div>
                  </div>
                  <div class="text-end ${profitClass}">
                    <small class="mb-1 d-block">P/L</small>
                    <div class="fw-semibold">${profitText}</div>
                    <small class="mb-0">${percentText}</small>
                  </div>
                </div>

                <div class="mt-auto">
                  <div class="progress rounded-pill">
                    <div class="progress-bar bg-gradient" role="progressbar" style="width: ${progressWidth}%"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      async function loadHoldings() {
        try {
          showStatus("Loading portfolio data…", "info");
          const response = await fetch("/api/holdings");
          const result = await response.json();

          if (!response.ok || !result.holdings) {
            showStatus("No holdings found. Connect Dhan API or check backend.", "warning");
            return;
          }

          currentHoldings = result.holdings;
          hideStatus();
          filterAndSortHoldings();
        } catch (error) {
          showStatus("Failed to load. Check console.", "danger");
          console.error(error);
        }
      }

      function updateTotals(filtered = currentHoldings) {
        const count = filtered.length;
        const investment = filtered.reduce((sum, item) => sum + (item.totalInvested || 0), 0);
        const value = filtered.reduce((sum, item) => {
          return sum + ((item.totalQty || 0) * (item.lastPrice || 0));
        }, 0);
        const pl = filtered.reduce((sum, item) => sum + (item.profit || 0), 0);

        totalHoldingsEl.textContent = count;
        totalInvestmentEl.textContent = `₹${investment.toLocaleString()}`;
        currentValueEl.textContent = `₹${value.toLocaleString()}`;
        
        const plText = pl >= 0 ? `+₹${pl.toLocaleString()}` : `-₹${Math.abs(pl).toLocaleString()}`;
        totalPlEl.textContent = plText;
        totalPlEl.className = pl >= 0 ? 'fs-3 fw-bold text-success' : 'fs-3 fw-bold text-danger';
      }

      function updateButtons() {
        // Filter buttons
        document.querySelectorAll('[id^="filter-"]').forEach(btn => {
          btn.classList.toggle('btn-primary', btn.id.replace('filter-', '') === currentFilter);
          btn.classList.toggle('btn-outline-primary', btn.id.replace('filter-', '') !== currentFilter);
        });

        // Sort buttons
        document.querySelectorAll('[id^="sort-"]').forEach(btn => {
          if (btn.id === `sort-${sortField}` || btn.id === 'sort-toggle') {
            btn.classList.add('btn-primary');
            btn.classList.remove('btn-outline-primary', 'btn-outline-secondary');
          } else {
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-outline-primary');
          }
        });
        
        document.getElementById('sort-toggle').textContent = sortAsc ? 'Asc' : 'Desc';
      }

      function filterAndSortHoldings() {
        updateButtons();
        
        let filtered = [...currentHoldings];
        
        // Filter
        if (currentFilter === 'etf') filtered = filtered.filter(item => item.instrumentType === 'ETF');
        else if (currentFilter === 'stk') filtered = filtered.filter(item => item.instrumentType === 'STK');
        
        // Sort
        filtered.sort((a, b) => {
          let aVal, bVal;
          switch (sortField) {
            case 'name': aVal = (a.stockName || a.tradingSymbol || "").toLowerCase(); bVal = (b.stockName || b.tradingSymbol || "").toLowerCase(); break;
            case 'invested': aVal = parseFloat(a.totalInvested || 0); bVal = parseFloat(b.totalInvested || 0); break;
            case 'pl': aVal = parseFloat(a.profitPercent || 0); bVal = parseFloat(b.profitPercent || 0); break;
          }
          return sortAsc ? (aVal > bVal ? 1 : -1) : (aVal < bVal ? 1 : -1);
        });

        holdingsRow.innerHTML = filtered.map((item, index) => renderCard(item, index)).join("");
        updateTotals(filtered);
      }

      // Event Listeners
      document.getElementById('filter-all').onclick = () => { currentFilter = 'all'; filterAndSortHoldings(); };
      document.getElementById('filter-etf').onclick = () => { currentFilter = 'etf'; filterAndSortHoldings(); };
      document.getElementById('filter-stk').onclick = () => { currentFilter = 'stk'; filterAndSortHoldings(); };
      
      document.getElementById('sort-name').onclick = () => { sortField = 'name'; filterAndSortHoldings(); };
      document.getElementById('sort-invested').onclick = () => { sortField = 'invested'; filterAndSortHoldings(); };
      document.getElementById('sort-pl').onclick = () => { sortField = 'pl'; filterAndSortHoldings(); };
      document.getElementById('sort-toggle').onclick = () => { sortAsc = !sortAsc; filterAndSortHoldings(); };

      // Auto load
      loadHoldings();
    </script>
  </body>
</html>
